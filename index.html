<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 锦弦的专属页面 ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ff9a9e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            z-index: 10;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
            max-width: 520px;
            width: 100%;
            backdrop-filter: blur(10px);
            animation: containerFade 1s ease-out;
            margin: 20px auto;
        }
        
        @keyframes containerFade {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .emoji-float {
            position: fixed;
            font-size: 2.5rem;
            animation: float 7s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(0) rotate(0deg) scale(1);
            }
            25% { 
                transform: translateY(-20px) rotate(5deg) scale(1.1);
            }
            50% { 
                transform: translateY(-35px) rotate(-3deg) scale(1);
            }
            75% { 
                transform: translateY(-15px) rotate(2deg) scale(0.9);
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.2) rotate(5deg); }
            75% { transform: scale(1.1) rotate(-3deg); }
        }
        
        @keyframes rainbow {
            0% { color: #ff6b6b; text-shadow: 0 0 10px #ff6b6b; }
            14% { color: #feca57; text-shadow: 0 0 10px #feca57; }
            28% { color: #48dbfb; text-shadow: 0 0 10px #48dbfb; }
            42% { color: #ff9ff3; text-shadow: 0 0 10px #ff9ff3; }
            57% { color: #54a0ff; text-shadow: 0 0 10px #54a0ff; }
            71% { color: #5f27cd; text-shadow: 0 0 10px #5f27cd; }
            85% { color: #00d2d3; text-shadow: 0 0 10px #00d2d3; }
            100% { color: #ff6b6b; text-shadow: 0 0 10px #ff6b6b; }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.85; }
        }
        
        @keyframes sparkle {
            0% { 
                opacity: 0; 
                transform: scale(0) rotate(0deg);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.2) rotate(180deg);
            }
            100% { 
                opacity: 0; 
                transform: scale(0) rotate(360deg);
            }
        }
        
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }
        
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .greeting {
            font-size: 1.5rem;
            color: #9b59b6;
            margin-bottom: 10px;
            animation: slideIn 0.8s ease-out 0.2s both;
        }
        
        .name {
            font-size: 3.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #5f27cd);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow 3s linear infinite, slideIn 0.8s ease-out 0.4s both;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .message {
            font-size: 1.1rem;
            color: #555;
            line-height: 2;
            margin-bottom: 25px;
            animation: slideIn 0.8s ease-out 0.6s both;
        }
        
        .cute-emoji {
            font-size: 4.5rem;
            animation: bounce 1.5s ease-in-out infinite;
            margin: 25px 0;
            display: inline-block;
            animation-delay: 0.5s;
        }
        
        .button-container {
            margin-top: 35px;
            animation: slideIn 0.8s ease-out 0.8s both;
        }
        
        .cute-button {
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            background-size: 200% 200%;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
            font-weight: bold;
            animation: rainbow 3s linear infinite;
            position: relative;
            overflow: hidden;
        }
        
        .cute-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        
        .cute-button:hover::before {
            left: 100%;
        }
        
        .cute-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.6);
        }
        
        .cute-button:active {
            transform: translateY(-2px) scale(1);
        }
        
        .sparkle {
            position: fixed;
            width: 15px;
            height: 15px;
            background: #feca57;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 2s ease-in-out infinite;
            z-index: 100;
        }
        
        .heart {
            position: fixed;
            font-size: 2.5rem;
            animation: float 5s ease-in-out infinite, heartBeat 1.5s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }
        
        .hidden-message {
            display: none;
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e, #f9ca24);
            border-radius: 20px;
            animation: pulse 2s ease-in-out infinite, slideIn 0.5s ease-out both;
            box-shadow: 0 5px 20px rgba(249, 202, 36, 0.3);
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        
        .confetti {
            position: fixed;
            font-size: 1.5rem;
            z-index: 50;
            pointer-events: none;
        }
        
        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .subtitle {
            font-size: 1rem;
            color: #888;
            font-style: italic;
            margin-top: 10px;
            animation: slideIn 0.8s ease-out 1s both;
        }
        
        .decorative-line {
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 200% 200%;
            animation: rainbow 3s linear infinite;
            margin: 20px 0;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="emoji-float" style="top: 8%; left: 3%;">🌸</div>
    <div class="emoji-float" style="top: 18%; right: 5%; animation-delay: 1.2s;">🌟</div>
    <div class="emoji-float" style="top: 65%; left: 2%; animation-delay: 2.5s;">🎀</div>
    <div class="emoji-float" style="top: 55%; right: 3%; animation-delay: 1.8s;">✨</div>
    <div class="emoji-float" style="top: 80%; left: 12%; animation-delay: 0.7s;">💫</div>
    <div class="emoji-float" style="top: 12%; right: 12%; animation-delay: 3s;">🎈</div>
    <div class="emoji-float" style="top: 35%; left: 5%; animation-delay: 2.2s;">🦋</div>
    <div class="emoji-float" style="top: 70%; right: 10%; animation-delay: 1.5s;">🌺</div>
    
    <div class="heart" style="top: 25%; left: 8%; animation-delay: 0.5s;">❤️</div>
    <div class="heart" style="top: 45%; right: 10%; animation-delay: 1.5s;">💕</div>
    <div class="heart" style="top: 72%; left: 6%; animation-delay: 2.2s;">💖</div>
    <div class="heart" style="top: 58%; right: 6%; animation-delay: 0.8s;">💗</div>
    
    <div class="container">
        <div class="greeting">👋 你好呀！</div>
        <div class="name">锦弦</div>
        <div class="decorative-line"></div>
        <div class="message">
            今天有个特别的惊喜等着你呢！<br>
            希望这个专属页面能让你的一天<br>
            变得超级超级美好～ 💖
        </div>
        <div class="cute-emoji">🎉</div>
        <div class="subtitle">✨ 准备好接收惊喜了吗？✨</div>
        <div class="button-container">
            <button class="cute-button" onclick="showSurprise()">点我看看！</button>
        </div>
        <div class="hidden-message" id="surpriseMessage">
            <div style="font-size: 1.8rem; font-weight: bold; color: #e17055; margin-bottom: 15px;">
                🎁 惊喜时间！🎁
            </div>
            <div style="margin-bottom: 15px; font-size: 1.2rem; line-height: 1.8;">
                亲爱的<span style="color: #d63031; font-weight: bold;"> 锦弦</span>：<br>
                你是最棒的！✨<br>
                今天也要开开心心的哦！💖<br>
                世界因为有你而更加美好！🌈
            </div>
            <div style="margin-top: 20px; font-size: 2.5rem;">
                🌈🦄🎂🎊🎈🎁💝🎀✨💫🌸
            </div>
        </div>
    </div>
    
    <script>
        // 创建星星背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // 显示惊喜消息
        function showSurprise() {
            const surpriseMessage = document.getElementById('surpriseMessage');
            surpriseMessage.style.display = 'block';
            
            // 添加更多闪烁效果
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createSparkle();
                }, i * 80);
            }
            
            // 添加彩带效果
            createConfetti();
            
            // 添加额外的心跳动画
            const hearts = document.querySelectorAll('.heart');
            hearts.forEach(heart => {
                heart.style.animation = 'float 3s ease-in-out infinite, heartBeat 0.8s ease-in-out infinite';
            });
        }
        
        // 创建闪烁效果
        function createSparkle() {
            const colors = ['#feca57', '#ff9ff3', '#48dbfb', '#ff6b6b', '#5f27cd'];
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * window.innerWidth + 'px';
            sparkle.style.top = Math.random() * window.innerHeight + 'px';
            sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
            sparkle.style.animationDelay = Math.random() * 0.5 + 's';
            sparkle.style.width = (Math.random() * 10 + 8) + 'px';
            sparkle.style.height = sparkle.style.width;
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 2000);
        }
        
        // 创建彩带效果
        function createConfetti() {
            const confettiEmojis = ['🎉', '🎊', '✨', '💖', '🌟', '🎈', '🎀', '🌸'];
            
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                    confetti.style.animation = `confettiFall ${Math.random() * 3 + 2}s linear forwards`;
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.remove();
                    }, 5000);
                }, i * 100);
            }
        }
        
        // 页面加载时创建星星
        window.onload = function() {
            createStars();
            
            // 定期创建闪烁效果
            setInterval(() => {
                createSparkle();
            }, 400);
            
            // 鼠标移动时添加额外的闪烁效果
            document.addEventListener('mousemove', function(e) {
                if (Math.random() > 0.92) {
                    createSparkleAtPosition(e.clientX, e.clientY);
                }
            });
        };
        
        // 在指定位置创建闪烁效果
        function createSparkleAtPosition(x, y) {
            const colors = ['#feca57', '#ff9ff3', '#48dbfb', '#ff6b6b', '#5f27cd'];
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
            sparkle.style.animationDelay = '0s';
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 2000);
        }
    </script>
</body>
</html>
